#This file is used to package the InventreeToHomeAssistant plugin.
#
#- It was generated by the InvenTree Plugin Creator tool - version 1.17.1
#- Ref: https://github.com/inventree/plugin_creator

[build-system]
requires = ["setuptools", "twine", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "inventree-inventreetohomeassistant"
description = "Small plugin to send data to HA when certain sublocations are updated on Inventree"
dynamic = ["version"]
authors = [
    { name = "Afonso Saraiva,Daniel Marques, Inês Francisco, Hugo Silva",email = "afonsosaraiva9@gmail.com" },
]
readme = "README.md"
license = "MIT"
keywords = ["inventree", "plugin"]
requires-python = ">=3.9"
dependencies = [
    # Enter your plugin library dependencies here
    "requests",
]

classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Framework :: InvenTree",
]
[project.urls]
Homepage = "https://inventreetohomeassistant.com"

[project.entry-points."inventree_plugins"]
InventreeToHomeAssistant = "inventreetohomeassistant.core:InventreeToHomeAssistant"

[tool.setuptools.packages.find]
where = [""]

[tool.setuptools.dynamic]
version = {attr = "inventreetohomeassistant.PLUGIN_VERSION"} 

[tool.ruff]
exclude = [
    ".git",
    "__pycache__",
    "test.py",
    "tests",
    "venv",
    "env",
    ".venv",
    ".env",
]

src=["inventreetohomeassistant"]

